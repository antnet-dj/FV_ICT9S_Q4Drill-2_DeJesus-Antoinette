<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill#2</title>
</head>
    <style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 
    0 8px 30px rgba(0,0,0,0.5), 
    0 0 20px rgba(255, 140, 0, 0.4),
    0 0 40px rgba(255, 140, 0, 0.2);
    border: 1px solid rgba(255,255,255,0.15);
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    background: #ff9f43;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #ff6b00;
    transform: scale(1.05);
}

#result {
    margin-top: 15px;
    font-weight: bold;
}
</style>
<body>
    <div class="container">
    <h2>Heat Index Checker</h2>

    <input type="number" id="temp" placeholder="Enter Temperature (°C)">
    <input type="number" id="humidity" placeholder="Enter Humidity (%)">

    <button onclick="checkHeatIndex()">Check</button>

    <div id="result"></div>
</div>

<script>
function checkHeatIndex() {
    var temp = parseFloat(document.getElementById("temp").value);
    var humid = parseFloat(document.getElementById("humidity").value);

    var HeatIndex = temp + (0.33 * humid) - 4;
    var message = "";

    switch (true) {
        case (HeatIndex <= 27):
            message = "Comfortable / Cool";
            break;

        case (HeatIndex >= 28 && HeatIndex <= 32):
            message = "Warm";
            break;

        case (HeatIndex >= 33 && HeatIndex <= 37):
            message = "Hot";
            break;

        case (HeatIndex >= 38 && HeatIndex <= 41):
            message = "Very Hot / Caution";
            break;

        default:
            message = "Extreme Heat / Danger";
    }

    document.getElementById("result").innerHTML =
        "Heat Index: " + HeatIndex.toFixed(2) + "°C<br>Status: " + message;
}
</script>

</body>
</html>
