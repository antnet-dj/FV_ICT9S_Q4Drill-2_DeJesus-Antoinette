<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill#2</title>
</head>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, orange, red);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            color: white;
            width: 300px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            background: orange;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
        }
    </style>
<body>
    <div class="container">
    <h2>Heat Index Checker</h2>

    <input type="number" id="temp" placeholder="Enter Temperature (°C)">
    <input type="number" id="humidity" placeholder="Enter Humidity (%)">

    <button onclick="checkHeatIndex()">Check</button>

    <div id="result"></div>
</div>

<script>
function teamRank() {
    var temp = parseFloat(document.getElementById("temp").value);
    var humid = parseFloat(document.getElementById("humidity").value);

    var HeatIndex = temp + (0.33 * humid) - 4;
    var message = "";

    switch (true) {
        case (HeatIndex <= 27):
            message = "Comfortable / Cool";
            break;

        case (HeatIndex >= 28 && HeatIndex <= 32):
            message = "Warm";
            break;

        case (HeatIndex >= 33 && HeatIndex <= 37):
            message = "Hot";
            break;

        case (HeatIndex >= 38 && HeatIndex <= 41):
            message = "Very Hot / Caution";
            break;

        default:
            message = "Extreme Heat / Danger";
    }

    document.getElementById("result").innerHTML =
        "Heat Index: " + HeatIndex.toFixed(2) + "°C<br>Status: " + message;
}
</script>

</body>
</html>
